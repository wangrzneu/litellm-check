name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  py-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile scanner
        run: python -m py_compile scan_malicious_litellm.py
